<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 인프라 브리핑</title>
<style>
  body{
    margin:0;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#0B0F14;
    color:#E7ECF1;
    font-family:-apple-system, 'Pretendard', sans-serif;
  }
  .box{text-align:center;}
  .dot{
    width:8px;height:8px;border-radius:50%;
    background:#4FD1C5;display:inline-block;
    animation:pulse 1.2s infinite ease-in-out;
    margin:0 3px;
  }
  .dot:nth-child(2){animation-delay:0.2s;}
  .dot:nth-child(3){animation-delay:0.4s;}
  @keyframes pulse{0%,80%,100%{opacity:0.2;}40%{opacity:1;}}
  p{color:#7C8896;font-size:14px;margin-top:14px;}
  a{color:#4FD1C5;}
</style>
</head>
<body>
  <div class="box">
    <div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    <p id="msg">최신 브리핑을 찾는 중...</p>
  </div>

<script>
  // emotionbrush-oss/ai-briefings 저장소의 briefings/ 폴더에서
  // 가장 최근 날짜 파일을 찾아 자동으로 이동합니다.
  const OWNER = "emotionbrush-oss";
  const REPO = "ai-briefings";
  const FOLDER = "briefings";

  fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FOLDER}`)
    .then(res => {
      if (!res.ok) throw new Error("목록을 불러오지 못했습니다");
      return res.json();
    })
    .then(files => {
      const htmlFiles = files
        .filter(f => f.name.endsWith(".html"))
        .sort((a, b) => a.name.localeCompare(b.name)); // YYYY-MM-DD 형식이라 문자열 정렬 = 날짜순

      if (htmlFiles.length === 0) {
        document.getElementById("msg").textContent = "아직 생성된 브리핑이 없습니다.";
        return;
      }

      const latest = htmlFiles[htmlFiles.length - 1].name;
      window.location.replace(`${FOLDER}/${latest}`);
    })
    .catch(err => {
      document.getElementById("msg").innerHTML =
        `자동 이동에 실패했습니다. <a href="${FOLDER}/">여기서 직접 선택</a>하세요.`;
    });
</script>
</body>
</html>
